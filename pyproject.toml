[project]
name = "localagent"
version = "0.2.0"
description = "完全本地的主动式 AI 助手：模糊意图会追问；Hindsight 长期多层次记忆（ChatGPT 历史/个人文档/对话）；联网搜索 + 本地 Shell，打通本机、用户画像与互联网"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "hzh" }]
keywords = ["ai", "cli", "agent", "memory", "ollama", "langgraph", "personal-assistant", "local", "mac", "offline"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "openpyxl>=3.1.0",
    "rank-bm25>=0.2.2",
    "numpy>=1.26.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.0",
    "cursor-sdk>=0.1.9",
]

[project.optional-dependencies]
full = [
    "langgraph>=0.2.0",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "langchain-core>=0.3.0",
    "langchain-ollama>=0.2.0",
    "chromadb>=0.5.0",
]
hindsight = ["hindsight-all>=0.8.0; python_version >= '3.11'"]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.3.0",
]

[project.scripts]
la = "localagent.cli:main"
LA = "localagent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/localagent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests/e2e"]
addopts = "-m 'not e2e and not e2e_live'"
markers = [
    "e2e: subprocess end-to-end tests against installed LA CLI",
    "e2e_live: requires live Ollama with a completion model",
]

[tool.ruff]
line-length = 100
target-version = "py310"
